site_name: AckAgent
site_description: Hardware-backed cryptographic signing with mobile approval
site_url: https://ackagent.com
repo_url: https://github.com/AckAgent/cli
repo_name: AckAgent/cli

theme:
  name: material
  custom_dir: overrides
  favicon: assets/favicon.svg
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AckAgent/cli

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Install CLI: getting-started/install-cli.md
      - Install Mobile App: getting-started/install-app.md
      - First Login: getting-started/first-login.md
  - Guides:
      - Git Commit Signing: guides/git-signing.md
      - SSH Keys: guides/ssh-keys.md
      - Claude Code Approvals: guides/claude-code.md
      - Age & SOPS Encryption: guides/age-sops.md
  - Security:
      - security/index.md
      - Cryptographic Deep Dive: security/deep-dive.md
      - Privacy: security/privacy.md
  - Reference:
      - CLI Reference: reference/cli.md
      - Troubleshooting: reference/troubleshooting.md
